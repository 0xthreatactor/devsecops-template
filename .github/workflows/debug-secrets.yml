name: DEBUG - Secret Visibility Test

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: 🕵️ Check All Available Secrets
        run: |
          echo "========== SECRET VISIBILITY REPORT =========="
          echo "Repository: ${{ github.repository }}"
          echo "Workflow file: .github/workflows/debug-secrets.yml"
          echo ""
          echo "Testing if GitHub can see any secrets at all..."
          echo ""
          
          # Method 1: Direct access
          echo "Method 1: Direct secret access:"
          if [ -n "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "  ✅ SONAR_HOST_URL is accessible via secrets.SONAR_HOST_URL"
          else
            echo "  ❌ SONAR_HOST_URL is NOT accessible"
          fi
          
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "  ✅ SONAR_TOKEN is accessible"
          else
            echo "  ❌ SONAR_TOKEN is NOT accessible"
          fi
          
          echo ""
          
          # Method 2: Using env vars (if they were set)
          echo "Method 2: Environment variables:"
          echo "  SONAR_HOST_URL env: ${SONAR_HOST_URL:-NOT SET}"
          echo "  SONAR_TOKEN env: ${SONAR_TOKEN:-NOT SET}"
          
          echo ""
          
          # Method 3: Check GitHub context
          echo "Method 3: GitHub context:"
          echo "  Repository: ${{ github.repository }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Event: ${{ github.event_name }}"
          
          echo ""
          echo "========== TROUBLESHOOTING GUIDE =========="
          echo ""
          echo "If secrets show as NOT accessible, check:"
          echo ""
          echo "1️⃣  REPOSITORY MISMATCH:"
          echo "   Current repo: ${{ github.repository }}"
          echo "   Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
          echo "   Verify secrets exist at THIS EXACT URL"
          echo ""
          echo "2️⃣  SECRETS vs VARIABLES:"
          echo "   Go to the URL above"
          echo "   Look at the tabs - you MUST be on the 'Secrets' tab (🔒 lock icon)"
          echo "   NOT the 'Variables' tab (📦 box icon)"
          echo ""
          echo "3️⃣  NAME MISMATCH:"
          echo "   Required names (CASE SENSITIVE):"
          echo "   - SONAR_HOST_URL"
          echo "   - SONAR_TOKEN"
          echo ""
          echo "4️⃣  ORGANIZATION vs REPOSITORY:"
          echo "   Are secrets at organization level or repo level?"
          echo "   They MUST be at: ${{ github.repository }} level"
          echo ""
          echo "5️⃣  ACTIONS CACHE:"
          echo "   Sometimes GitHub caches. Try:"
          echo "   - Push a dummy commit"
          echo "   - Close and reopen PR"
          echo "   - Wait 5 minutes"
          
          # Fail so we can see the output
          exit 1
