name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly security scan
    - cron: '0 2 * * 0'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/my-app

jobs:
  security-scans:
    name: 🔒 Security Scans
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ FIXED: Proper secret verification
      - name: Verify SonarQube Secrets
        run: |
          if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "::error::SONAR_HOST_URL secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]]; then
            echo "::error::SONAR_TOKEN secret is not set!"
            exit 1
          fi
          echo "✅ SonarQube secrets verified"

      # 1. Secret Scanning
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      # 2. SAST with SonarQube - ✅ FIXED: Using official action
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2.0.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.coverage.exclusions=**/*.test.js,**/tests/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      # 3. Wait for Quality Gate
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # 4. Dependency Scanning
      - name: OWASP Dependency Check
        run: |
          mkdir -p reports
          docker run --rm \
            -v $PWD:/project \
            -v $PWD/reports:/report \
            owasp/dependency-check:latest \
            --scan /project \
            --format HTML \
            --format JSON \
            --format SARIF \
            --out /report \
            --failOnCVSS 7 \
            --suppression /project/dependency-suppression.xml
        continue-on-error: true

      - name: Upload Dependency Check Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif
        continue-on-error: true

      # 5. Filesystem Vulnerability Scan with Trivy
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
        continue-on-error: true

  security-scorecard:
    name: 📊 OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v4.0.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  docker-build:
    name: 🐳 Docker Build & Scan
    needs: [security-scans, security-scorecard]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
        continue-on-error: true

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'
        continue-on-error: true

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  security-report:
    name: 📊 Security Report
    needs: [security-scans, docker-build, security-scorecard]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Generate Security Summary
        run: |
          cat << EOF > security-summary.md
          # 🔒 Security Scan Summary
          
          ## 📋 Scan Overview
          | Scan Type | Status | Findings |
          |-----------|--------|----------|
          | SAST (SonarQube) | ${{ job.status }} | Check Security tab |
          | Secret Scan (TruffleHog) | ${{ job.status }} | Check Security tab |
          | SCA (OWASP DC) | ${{ job.status }} | See artifacts |
          | Container Scan (Trivy) | ${{ job.status }} | See artifacts |
          | Supply Chain (Scorecard) | ${{ job.status }} | See artifacts |
          
          ## 🎯 Next Steps
          1. Review all findings in GitHub Security tab
          2. Check SonarQube dashboard for code quality
          3. Fix critical vulnerabilities
          4. Update dependencies
          
          ## 📊 Scorecard Summary
          [View Scorecard Results](https://securityscorecards.dev/viewer/?uri=github.com/${{ github.repository }})
          
          ---
          *Report generated: $(date)*
          *Commit: ${{ github.sha }}*
          *Branch: ${{ github.ref_name }}*
          EOF

      - name: Upload Security Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
