name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly security scan
    - cron: '0 2 * * 0'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/my-app
  # ⚠️ IMPORTANT: These secrets MUST be set in your repository
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  security-scans:
    name: 🔒 Security Scans
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ FIX 1: Verify secrets are set before proceeding
      - name: Verify SonarQube Secrets
        run: |
          if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "::error::SONAR_HOST_URL secret is not set! Please add it to your repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "::error::SONAR_TOKEN secret is not set! Please add it to your repository secrets."
            exit 1
          fi
          echo "✅ SonarQube secrets verified"

      # 1. Secret Scanning
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.event.after }}
          extra_args: --debug --only-verified
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.base.sha != github.event.pull_request.head.sha) ||
          (github.event_name == 'push' && github.event.before != github.event.after)

      # 2. SAST with SonarQube - ✅ FIXED with error handling
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          # Verify URL format
          if [[ ! "$SONAR_HOST_URL" =~ ^https?:// ]]; then
            echo "::error::SONAR_HOST_URL must start with http:// or https://"
            exit 1
          fi
          
          # Run SonarScanner
          docker run --rm \
            -e SONAR_HOST_URL="$SONAR_HOST_URL" \
            -e SONAR_TOKEN="$SONAR_TOKEN" \
            -v "$PWD:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }} \
            -Dsonar.branch.name=${{ github.ref_name }} \
            -Dsonar.coverage.exclusions=**/*.test.js,**/tests/**
        continue-on-error: false

      # 3. Wait for Quality Gate
      - name: SonarQube Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          # Wait for analysis to complete and check quality gate
          sleep 10
          curl -u "$SONAR_TOKEN:" "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}" | jq -r '.projectStatus.status'
        continue-on-error: true

      # 4. Dependency Scanning
      - name: OWASP Dependency Check
        run: |
          mkdir -p reports
          docker run --rm \
            -v $PWD:/project \
            -v $PWD/reports:/report \
            owasp/dependency-check:latest \
            --scan /project \
            --format HTML \
            --format JSON \
            --out /report \
            --failOnCVSS 7 \
            --suppression /project/dependency-suppression.xml
        continue-on-error: true

      # 5. Filesystem Vulnerability Scan with Trivy
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'

  # ✅ FIX 2: Scorecard with commit SHA (most reliable)
  security-scorecard:
    name: 📊 OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Use specific commit SHA instead of version tag
      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v4.0.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  docker-build:
    name: 🐳 Docker Build & Scan
    needs: [security-scans, security-scorecard]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  security-report:
    name: 📊 Security Report
    needs: [security-scans, docker-build, security-scorecard]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate Security Summary
        run: |
          cat << EOF > security-summary.md
          # Security Scan Summary
          
          ## Scan Results
          - ✅ SAST Scan: SonarQube completed
          - ✅ Secret Scan: TruffleHog completed  
          - ✅ SCA Scan: OWASP Dependency Check completed
          - ✅ Container Scan: Trivy completed
          - ✅ Supply Chain: OpenSSF Scorecard completed
          
          ## Vulnerabilities
          - Check SARIF files in Security tab
          - SBOM attached as artifact
          
          ## Next Steps
          1. Review critical findings in Security tab
          2. Check SonarQube dashboard for code quality
          3. Update dependencies if needed
          4. Review Scorecard recommendations
          EOF

      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
