name: Test Secrets Only

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Secret Access
        run: |
          echo "Testing secret access..."
          
          if [ -n "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "✅ SONAR_HOST_URL is accessible"
          else
            echo "❌ SONAR_HOST_URL is NOT accessible"
            exit 1
          fi
          
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "✅ SONAR_TOKEN is accessible"
          else
            echo "❌ SONAR_TOKEN is NOT accessible"
            exit 1
          fi
